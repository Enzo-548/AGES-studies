
<!DOCTYPE html>
    <html>
        <head>
            <meta name="viewport" content="width=device-width, initial-scale=1.0">            
            <link rel="stylesheet" href="style.css">
            <title>Calculadora</title>
        </head>
        <body>
            <script src = "script.js">
            </script>
            <div class = "calculator">    
                
                    <div class = "calculator-calculo">
                        <div class = "operacao" style="visibility: hidden;">dummy_operacao</div>
                        <div class = "resultado">
                        <div class = "upper-equals">=</div>
                        <div class = "algarismo" style="visibility: hidden;">dummy_algarismo</div>
                        
                        </div>
                    </div>
                    <div class = "calculator-teclado">
                        <button class="button-calculator", id="button-calculator-DELETE">
                            CE
                        </button>
                        <button class="button-calculator", id="button-calculator-NUMBER-PERCENTAGE">
                            %
                        </button>
                        <button class="button-calculator", id="button-calculator-NUMBER-CDELETE">
                            C
                        </button>
                        <button class="button-calculator", id="button-calculator-OPERATIONS">
                            ÷
                        </button>
                        <button class="button-calculator", id="button-calculator-NUMBER">
                            7
                        </button>
                        <button class="button-calculator", id="button-calculator-NUMBER">
                            8
                        </button>
                        <button class="button-calculator", id="button-calculator-NUMBER">
                            9
                        </button>
                        <button class="button-calculator", id="button-calculator-OPERATIONS">
                            ×
                        </button>
                        
                        <button class="button-calculator", id="button-calculator-NUMBER">
                            4
                        </button>
                        <button class="button-calculator", id="button-calculator-NUMBER">
                            5
                        </button>
                        <button class="button-calculator", id="button-calculator-NUMBER">

                        </button>
                        <button class="button-calculator", id="button-calculator-OPERATIONS">

                        </button>

                        </button>

                        <button class="button-calculator", id="button-calculator-OPERATIONS">

                        </button>
                        <button class="button-calculator", id="button-calculator-NUMBER-INVERT">

                        </button>
                        <button class="button-calculator", id="button-calculator-NUMBER">

                        <button class="button-calculator", id="button-calculator-NUMBER">

            </div>
